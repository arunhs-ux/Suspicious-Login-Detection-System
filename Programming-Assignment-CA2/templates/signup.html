<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
        }
        .box {
            background: white;
            padding: 30px;
            margin: 100px auto;
            width: 340px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 95%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        a {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: #007BFF;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>📝 Create Account</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <input type="email" name="email" placeholder="Email" required><br>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <button type="submit">Create Account</button>
    </form>

    <a href="/">Back to Login</a>
</div>
</body>
</html>
